<header class="header">
  <div class="header__box">
    <div class="header__logo">
      @@include('html/components/logo.html')
    </div>
    <p class="header__ttl">
      <span class="header__ttl-part">Превратите уездный город</span>
      <span class="header__ttl-part header__ttl-part--center">в столицу земного шара</span>
    </p>
    <p class="header__slogan">
      Оплатите взнос на телеграммы для организации Международного васюкинского турнира по шахматам
    </p>
    <div class="header__btns">
      <button class="btn header__btn" aria-label="Поддержать шахматную мысль" type="button">
        <span class="btn__txt" aria-hidden="true">Поддержать</span>
        <span class="btn__txt" aria-hidden="true">шахматную мысль</span>
      </button>
      <button class="btn btn--secondary header__btn" aria-label="Поддержать шахматную мысль" type="button">
        <span class="btn__txt" aria-hidden="true">Подробнее</span>
        <span class="btn__txt" aria-hidden="true">о турнире</span>
      </button>
    </div>
  </div>
  <div class="header__group">
    <img class="header__city" src="assets/city.webp" alt="Город и шахматная доска" />
    <img class="header__ellipse" src="assets/ellipse.webp" alt="Эллипс со слогоном" />
    <img class="header__horse" src="assets/horse.webp" alt="Шахматный конь" />
    <img class="header__pawn" src="assets/pawn.webp" alt="Шахматная пешка" />
    <img class="header__king" src="assets/king.webp" alt="Шахматный король" />
    <img class="header__queen" src="assets/queen.webp" alt="Шахматная королева" />
  </div>
</header>
